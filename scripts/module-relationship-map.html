// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
const ES = {
  data:  { color: 'rgba(148,163,184,0.35)', width: 1.8, type: 'solid',  curveness: 0.15 },
  notif: { color: 'rgba(59,130,246,0.45)',   width: 1.5, type: 'dashed', curveness: 0.25 },
  auto:  { color: 'rgba(236,72,153,0.5)',   width: 2.2, type: 'dotted', curveness: 0.3 },
  nav:   { color: 'rgba(16,185,129,0.3)',   width: 1.0, type: 'solid',  curveness: 0.1 },
};

function L(source, target, type, label) {
  const s = ES[type];
  return {
    source, target,
    lineStyle: { color: s.color, width: s.width, type: s.type, curveness: s.curveness },
    label: label ? {
      show: true, formatter: label, fontSize: 9, color: '#94A3B8',
      fontFamily: 'Segoe UI, system-ui, sans-serif'
    } : undefined,
  };
}

  L('الجودة','خصوم الموارد البشرية','data'),
  L('الجودة','مركز المخاطر','data'),
  L('الجودة','ملف الموظف 360°','data'),

  L('خصوم الموارد البشرية','التقارير','data','خصوم HR'),
  L('خصوم الموارد البشرية','مركز المخاطر','data'),
  L('خصوم الموارد البشرية','ملف الموظف 360°','data'),
  L('المتابعة اليومية','مركز المخاطر','data'),

  L('مركز المخاطر','مركز العمليات','data'),
  L('نظام كابا','مركز العمليات','data'),
  L('السفر','ملف الموظف 360°','data'),

  L('قواعد الخصم','الرئيسية','data'),
  L('التقارير','الحضور والانصراف','data'),
  L('التقارير','البصمة','data'),
  L('التقارير','الطلبات','data'),
  L('التقارير','الجودة','data'),
  L('التقارير','خصوم الموارد البشرية','data'),
  L('التقارير','قواعد الخصم','data'),

  // ── NAVIGATION ──
  L('الرئيسية','الموظفين','nav'),
  L('الرئيسية','البصمة','nav'),
  L('الرئيسية','الحضور والانصراف','nav'),
  L('الرئيسية','الطلبات','nav'),

  L('الرئيسية','السفر','nav'),
  L('الرئيسية','المتابعة اليومية','nav'),
  L('الرئيسية','التقارير','nav'),
  L('مركز العمليات','المتابعة اليومية','nav'),
  L('مركز العمليات','شكاوى العملاء','nav'),
  L('مركز العمليات','نظام كابا','nav'),
  L('مركز العمليات','الجودة','nav'),
  L('مركز العمليات','خصوم الموارد البشرية','nav'),
  L('مركز العمليات','الطلبات','nav'),

  L('ملف الموظف 360°','الحضور والانصراف','data'),

  // ── NOTIFICATIONS ──
  L('المتابعة اليومية','مركز الإشعارات','notif','إشعار'),
  L('الحضور والانصراف','مركز الإشعارات','notif'),
  L('الجودة','مركز الإشعارات','notif'),
  L('خصوم الموارد البشرية','مركز الإشعارات','notif'),
  L('شكاوى العملاء','مركز الإشعارات','notif'),

  L('الأتمتة والقواعد','خصوم الموارد البشرية','auto','تحذير HR'),

// ═══════════════════════════════════════════════════
//  CHART
// ═══════════════════════════════════════════════════
const chart = echarts.init(document.getElementById('chart'));
const option = {
  backgroundColor: '#0B1120',
  textStyle: {
    fontFamily: 'Segoe UI, system-ui, sans-serif',
    color: '#CBD5E1',
  },

  title: {
    text: 'خريطة علاقات وحدات نظام ARM ERP',
    subtext: '21 وحدة  \u2022  7 مجموعات  \u2022  120+ علاقة متبادلة',
    left: 'center', top: 20,
    textStyle: { fontSize: 22, fontWeight: 'bold', color: '#F1F5F9',
      fontFamily: 'Segoe UI, system-ui, sans-serif' },
    subtextStyle: { fontSize: 13, color: '#64748B',
      fontFamily: 'Segoe UI, system-ui, sans-serif' },
  },

  tooltip: {
    trigger: 'item',
    backgroundColor: 'rgba(15, 23, 42, 0.95)',
    borderColor: '#334155', borderWidth: 1,
    padding: [12, 16],
    textStyle: { color: '#F1F5F9', fontSize: 12,
      fontFamily: 'Segoe UI, system-ui, sans-serif' },
    formatter: function(p) {
      if (p.dataType === 'node') {
        const cat = categories[p.data.category];
        const c = p.data.value || 0;
        return '<div style="direction:rtl;text-align:right">'
          + '<strong style="font-size:14px;color:' + cat.itemStyle.color + '">' + p.name + '</strong><br/>'
          + '<span style="color:#94A3B8">المجموعة:</span> ' + cat.name + '<br/>'
          + '<span style="color:#94A3B8">عدد الاتصالات:</span> <strong>' + c + '</strong></div>';
      } else if (p.dataType === 'edge') {
        return '<div style="direction:rtl;text-align:right">'
          + '<strong>' + p.data.source + '</strong> \u2194 <strong>' + p.data.target + '</strong>'
          + (p.data.label ? '<br/><span style="color:#94A3B8">' + p.data.label + '</span>' : '')
          + '</div>';
      }
      return '';
    },
  },

  legend: {
    data: categories.map(c => c.name),
    orient: 'horizontal', bottom: 20,
    itemWidth: 16, itemHeight: 16, itemGap: 24,
    textStyle: { color: '#94A3B8', fontSize: 12,
      fontFamily: 'Segoe UI, system-ui, sans-serif' },
    icon: 'roundRect',
  },

  series: [{
    type: 'graph',
    layout: 'force',
    animation: true,
    animationDuration: 1500,
    animationEasingUpdate: 'quinticInOut',

    force: {
      initLayout: 'circular',
      repulsion: 520,
      gravity: 0.08,
      edgeLength: [120, 280],
      friction: 0.6,
      layoutAnimation: true,
    },

    roam: true,
    draggable: true,
    zoom: 0.9,

    data: nodes,
    links: links,
    categories: categories,

    symbol: 'roundRect',

    label: {
      show: true,
      position: 'bottom',
      distance: 8,
      fontSize: 11,
      fontFamily: 'Segoe UI, system-ui, sans-serif',
      color: '#CBD5E1',
      formatter: '{b}',
    },

    itemStyle: {
      borderColor: '#334155',
      borderWidth: 2,
      shadowBlur: 8,
      shadowColor: 'rgba(0,0,0,0.3)',
    },

    edgeLabel: {
      fontSize: 9,
      fontFamily: 'Segoe UI, system-ui, sans-serif',
      color: '#64748B',
    },

    emphasis: {
      focus: 'adjacency',
      itemStyle: {
        borderWidth: 4,
        shadowBlur: 25,
        shadowColor: 'rgba(59,130,246,0.3)',
      },
      lineStyle: { width: 3 },
      label: { fontSize: 14, fontWeight: 'bold' },
    },

    edgeSymbol: ['none', 'arrow'],
    edgeSymbolSize: [0, 8],
  }],
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
